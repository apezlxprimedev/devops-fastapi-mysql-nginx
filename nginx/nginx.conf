events {}

http {

    upstream backend {
        server app1:8000;
        server app2:8000;
        server app3:8000;
    }
    
    server {
        listen 80;
        location / {
            proxy_pass http://backend;
        }
        location /health {
	    proxy_pass http://backend;
	}
        location /createuser {
            proxy_pass http://backend;
        }
    }
}
