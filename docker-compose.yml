services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    volumes:
      - db_data:/var/lib/mysql

  app1:
    build: .
    environment:
      APP_NAME: app1
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: testdb

  app2:
    build: .
    environment:
      APP_NAME: app2
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: testdb

  app3:
    build: .
    environment:
      APP_NAME: app3
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: testdb

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
      - app3

volumes:
  db_data:
